<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Letter</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Georgia', serif;
  
    background: linear-gradient(135deg, #f3e9e2, #d6d3e0, #c9d6df);
  }
  
  .particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    animation: float 12s linear infinite;
  }

  @keyframes float {
    from {
      transform: translateY(100vh) scale(0.5);
      opacity: 0;
    }
    50% {
      opacity: 0.6;
    }
    to {
      transform: translateY(-10vh) scale(1);
      opacity: 0;
    }
  }

  .hidden-text {
    position: absolute;
    font-size: 28px;
    color: rgba(0,0,0,0.6);
    text-align: center;
    opacity: 0;
    transition: opacity 2s ease;
    letter-spacing: 1px;
  }

  .show-hidden {
  opacity: 1;
  }
  
  .letter {
    background: rgba(255, 253, 248, 0.85);
    backdrop-filter: blur(6px);
    width: 520px;
    padding: 50px 40px;
    border-radius: 18px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.15);
    cursor: pointer;
    transition: opacity 1.5s ease, transform 1s ease;
    position: relative;
  }

  .text {
    font-size: 18px;
    line-height: 1.8;
    text-align: center;
    color: #2f2f2f;
    min-height: 140px;
    letter-spacing: 0.3px;
    opacity: 1;
    transition: opacity 0.8s ease;
  }

  .fade-out {
    opacity: 0;
  }

  .signature {
    margin-top: 30px;
    text-align: right;
    font-family: 'Brush Script MT', cursive;
    font-size: 24px;
    opacity: 0;
    transition: opacity 2s ease;
  }

  .show-signature {
    opacity: 1;
  }
  
  .disappear {
    opacity: 0;
    transform: translateY(20px) scale(0.98);
    pointer-events: none;
  }

</style>
</head>

<body>

<script>
  for (let i = 0; i < 25; i++) {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (8 + Math.random() * 6) + "s";
    p.style.opacity = Math.random();
    document.body.appendChild(p);
  }
</script>

<div id="hiddenText" class="hidden-text">
  Ipasa mo 'to sa benteng tao.
</div>
<div id="letter" class="letter" onclick="nextLine()">
  <div id="text" class="text">
    Click to begin...
  </div>

  <div id="signature" class="signature">
    - Emerson
  </div>
</div>

<script>
  const lines = [
    "I have something to tell you, just to clear up my mind. I might sound selfish right now, but I guess that's just how it is.",
    "Look, I really haven’t moved on from what happened between us. Nothing really happened, but it mattered to me—and that's what hurts the most.",
    "For a long time, I wanted it to be you. After spending so much time avoiding things, I thought I had finally gotten over you.",
    "That’s where I was wrong.",
    "I kept brushing it off, concealing it like a stain on a white shirt, and I was wrong—I like you more than I should.",
    "You asked me something that lingered in my mind.",
    "\"Bakit ang ingay mo sa chat?\"",
    "I'll be honest—I wouldn’t say I never thought about that, but when you asked it",
    "that’s when it clicked.",
    "I spent months of avoiding every possible contact with you. I know it sounds harsh, but that's the only way I could think at that time.",
    "Avoiding you became a chore.",
    "When we started talking again, I felt light",
    "free from the burden of trying to avoid you.",
    "This will serve as a closure—if not for you, then for myself.",
    "What we had felt unfinished. I didn't send this message because I want it to continue.",
    "I still care",
    "I do",
    "and I don't think I can love the same way after this."
  ];

  let index = 0;
  let typing = false;

  function typeWriter(text, element, speed = 28) {
    let i = 0;
    element.innerHTML = "";
    typing = true;

    function type() {
      if (i < text.length) {
        element.innerHTML += text.charAt(i);
        i++;
        setTimeout(type, speed);
      } else {
        typing = false;
      }
    }

    type();
  }

  function nextLine() {
    if (typing) return;

    const text = document.getElementById("text");
    const signature = document.getElementById("signature");
    const letter = document.getElementById("letter");

    text.classList.add("fade-out");

    setTimeout(() => {
      if (index < lines.length) {
        text.classList.remove("fade-out");
        typeWriter(lines[index], text);
        index++;
      } else if (index === lines.length) {
        text.innerHTML = "";
        signature.classList.add("show-signature");
        index++;
      } else {
  letter.classList.add("disappear");

  setTimeout(() => {
    document.getElementById("hiddenText").classList.add("show-hidden");
  }, 1000);
}
    }, 600);
  }
</script>

</body>
</html>
