<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Letter</title>

<style>
  body {
    background: #f6f1f1;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Georgia', serif;
    overflow: hidden;
  }

  /* Spotify Card Container */
  .spotify-container {
    position: absolute;
    opacity: 0;
    transition: opacity 1.2s ease;
  }

  .show-spotify {
    opacity: 1;
  }

  /* Spotify Card */
  .spotify-card {
    display: flex;
    gap: 15px;
    background: #2a2a2a;
    padding: 15px;
    border-radius: 16px;
    text-decoration: none;
    color: white;
    width: 260px;
    transition: 0.3s;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  .spotify-card:hover {
    transform: scale(1.05);
  }

  .album-cover {
    width: 80px;
    height: 80px;
    border-radius: 8px;
  }

  .spotify-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .title {
    font-weight: bold;
    font-size: 16px;
  }

  .artist {
    font-size: 14px;
    color: #bbb;
  }

  .spotify-label {
    font-size: 12px;
    margin-top: 5px;
    opacity: 0.7;
  }

  /* Letter */
  .letter {
    background: #fffdf8;
    width: 500px;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: opacity 0.8s ease, transform 0.5s;
    z-index: 2;
  }

  .text {
    font-size: 18px;
    line-height: 1.6;
    color: #333;
    min-height: 120px;
    text-align: center;
    opacity: 1;
    transition: opacity 0.6s ease;
  }

  .fade-out {
    opacity: 0;
  }

  .signature {
    margin-top: 20px;
    text-align: right;
    font-style: italic;
    opacity: 0;
    transition: opacity 0.8s;
  }

  .show-signature {
    opacity: 1;
  }

  .disappear {
    opacity: 0;
    transform: scale(0.95);
    pointer-events: none;
  }
</style>
</head>

<body>

<!-- Spotify Card -->
<div id="spotifyContainer" class="spotify-container">
  <a href="https://open.spotify.com/track/6BGNjTZ8zp9MlsIydBa7A9?si=f23178aeb3c74dce" target="_blank" class="spotify-card">
    
    <img src="https://i.scdn.co/image/ab67616d0000b273c6c6f4e4a2a5f6bfa1d5bb12" class="album-cover">

    <div class="spotify-info">
      <div class="title">For Lovers</div>
      <div class="artist">Lamp</div>
      <div class="spotify-label">Spotify</div>
    </div>

  </a>
</div>

<!-- Letter -->
<div id="letter" class="letter" onclick="nextLine()">
  <div id="text" class="text">
    Click to read...
  </div>

  <div id="signature" class="signature">
    - Emerson
  </div>
</div>

<script>
  const lines = [
    "I have something to tell you, just to clear up my mind. I might sound selfish right now, but I guess that's just how it is.",
    "Look, I really haven’t moved on from what happened between us. Nothing really happened, but it mattered to me—and that's what hurts the most.",
    "For a long time, I wanted it to be you. After spending so much time avoiding things, I thought I had finally gotten over you.",
    "That’s where I was wrong.",
    "I kept brushing it off, concealing it like a stain on a white shirt, and I was wrong—I like you more than I should.",
    "You asked me something that lingered in my mind.",
    "\"Bakit ang ingay mo sa chat?\"",
    "I'll be honest—I wouldn’t say I never thought about that, but when you asked it",
    "that’s when it clicked.",
    "I spent months of avoiding every possible contact with you. I know it sounds harsh, but that's the only way I could think at that time.",
    "Avoiding you became a chore.",
    "When we started talking again, I felt light",
    "free from the burden of trying to avoid you.",
    "This will serve as a closure—if not for you, then for myself.",
    "What we had felt unfinished. I didn't send this message because I want it to continue.",
    "I still care",
    "I do",
    "and I don't think I can love the same way after this."
  ];

  let index = 0;

  function nextLine() {
    const text = document.getElementById("text");
    const signature = document.getElementById("signature");
    const letter = document.getElementById("letter");
    const spotify = document.getElementById("spotifyContainer");

    text.classList.add("fade-out");

    setTimeout(() => {
      if (index < lines.length) {
        text.innerText = lines[index];
        text.classList.remove("fade-out");
        index++;
      } else if (index === lines.length) {
        text.innerText = "";
        signature.classList.add("show-signature");
        text.classList.remove("fade-out");
        index++;
      } else {
        // Final click
        letter.classList.add("disappear");
        spotify.classList.add("show-spotify");
      }
    }, 500);
  }
</script>

</body>
</html>
