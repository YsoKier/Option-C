<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Letter</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Georgia', serif;
    background: linear-gradient(135deg, #f3e9e2, #d6d3e0, #c9d6df);
  }
  
  .envelope {
    width: 300px;
    height: 200px;
    background: #e8dcd2;
    position: relative;
    cursor: pointer;
    border-radius: 6px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    transition: transform 0.5s;
  }
  
  .flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100px;
    background: #d8c8bc;
    clip-path: polygon(0 0, 50% 100%, 100% 0);
    transform-origin: top;
    transition: transform 0.8s ease;
  }

  .open .flap {
    transform: rotateX(180deg);
  }
  
  .letter {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    width: 260px;
    background: rgba(255,253,248,0.95);
    padding: 25px;
    border-radius: 10px;
    text-align: center;
    opacity: 0;
    transition: all 1s ease;
  }
  
  .rise {
    transform: translate(-50%, -180px);
    opacity: 1;
  }
  
  .fall {
    transform: translate(-50%, 120px);
    opacity: 1;
  }
  
  .reading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    width: 520px;
    padding: 50px 40px;
    border-radius: 18px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.15);
    cursor: pointer;
  }

  .text {
    min-height: 140px;
    line-height: 1.8;
    transition: opacity 0.6s;
  }

  .fade-out {
    opacity: 0;
  }

  .signature {
    margin-top: 20px;
    text-align: right;
    font-family: 'Brush Script MT', cursive;
    font-size: 22px;
    opacity: 0;
    transition: opacity 1.5s;
  }

  .show-signature {
    opacity: 1;
  }

  .disappear {
    opacity: 0;
    transform: translate(-50%, -30%) scale(0.95);
  }

</style>
</head>

<body>

<div id="envelope" class="envelope" onclick="openEnvelope()">
  <div class="flap"></div>

  <div id="letter" class="letter">
    <div id="text">Click to begin...</div>
    <div id="signature" class="signature">- Emerson</div>
  </div>
</div>

<script>
  let stage = 0;

  function openEnvelope() {
    const envelope = document.getElementById("envelope");
    const letter = document.getElementById("letter");

    if (stage === 0) {
      envelope.classList.add("open");

      setTimeout(() => {
        letter.classList.add("rise");
      }, 500);

      setTimeout(() => {
        letter.classList.remove("rise");
        letter.classList.add("fall");
      }, 1800);

      setTimeout(() => {
        envelope.style.display = "none";
        letter.classList.add("reading");
      }, 3000);

      stage = 1;
    }
  }

  const lines = [
    "I have something to tell you, just to clear up my mind. I might sound selfish right now, but I guess that's just how it is.",
    "Look, I really haven’t moved on from what happened between us. Nothing really happened, but it mattered to me—and that's what hurts the most.",
    "For a long time, I wanted it to be you. After spending so much time avoiding things, I thought I had finally gotten over you.",
    "That’s where I was wrong.",
    "I kept brushing it off, concealing it like a stain on a white shirt, and I was wrong—I like you more than I should.",
    "You asked me something that lingered in my mind.",
    "\"Bakit ang ingay mo sa chat?\"",
    "I'll be honest—I wouldn’t say I never thought about that, but when you asked it",
    "that’s when it clicked.",
    "I spent months of avoiding every possible contact with you.",
    "Avoiding you became a chore.",
    "When we started talking again, I felt light",
    "free from the burden of trying to avoid you.",
    "This will serve as a closure—if not for you, then for myself.",
    "What we had felt unfinished.",
    "I still care",
    "I do",
    "and I don't think I can love the same way after this."
  ];

  let index = 0;

  function nextLine() {
    const text = document.getElementById("text");
    const signature = document.getElementById("signature");
    const letter = document.getElementById("letter");

    text.classList.add("fade-out");

    setTimeout(() => {
      if (index < lines.length) {
        text.innerText = lines[index];
        text.classList.remove("fade-out");
        index++;
      } else if (index === lines.length) {
        text.innerText = "";
        signature.classList.add("show-signature");
        index++;
      } else {
        letter.classList.add("disappear");
      }
    }, 500);
  }

  document.addEventListener("click", () => {
    if (stage === 1) nextLine();
  });
</script>

</body>
</html>
